[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to avoid CORS (mirrors the Vite dev proxy).
# Must come before the SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "https://api.zomrodev.online/v1/api/:splat"
  status = 200
  force = true

# SPA fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
